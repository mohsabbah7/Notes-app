<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf6ff, #fff);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 28px;
            color: #f5576c;
        }

        .logout {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            background: #f5576c;
            color: white;
            font-weight: bold;
        }

        /* ADD NOTE */
        .add-box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
            outline: none;
        }

        textarea {
            height: 100px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* NOTES GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 8px;
            color: #333;
        }

        .card p {
            font-size: 13px;
            color: #777;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .edit { background: #3b82f6; }
        .delete { background: #ef4444; }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📝 My Notes</h1>
        <a class="logout" href="/logout">Logout</a>
    </div>

    <!-- ADD NOTE -->
    <div class="add-box">
        <form th:action="@{/notes/add}" method="post">
            <input type="text" name="title" placeholder="Title" required>
            <textarea name="content" placeholder="Write your note..." required></textarea>
            <button type="submit">Add Note</button>
        </form>
    </div>

    <!-- NOTES -->
    <div class="grid">
        <div class="card" th:each="note : ${notes}">
            <h3 th:text="${note.title}"></h3>
            <p th:text="${note.content}"></p>

            <div class="actions">
                <a class="btn edit"
                   th:href="@{/notes/edit/{id}(id=${note.id})}">
                    Edit
                </a>

                <a class="btn delete"
                   th:href="@{/notes/delete/{id}(id=${note.id})}">
                    Delete
                </a>
            </div>
        </div>
    </div>

</div>

</body>
</html>

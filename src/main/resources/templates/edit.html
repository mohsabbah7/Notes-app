
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Note</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .card {
            width: 420px;
            padding: 30px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 15px;
            color: #f5576c;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        textarea {
            height: 120px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #555;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Edit Note ✏️</h1>

    <form th:action="@{/notes/edit/{id}(id=${note.id})}" method="post">
        <input type="text" name="title" th:value="${note.title}" required>
        <textarea name="content" th:text="${note.content}" required></textarea>
        <button type="submit">Save Changes</button>
    </form>

    <a href="/notes">Cancel</a>
</div>

</body>
</html>
